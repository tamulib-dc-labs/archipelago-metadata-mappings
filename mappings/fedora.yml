      Apfelbaum:
        - dc_description # "Held in the Archive of World War I German and Austrian Documents at Cushing Memorial Library on the campus of Texas A&M University, College Station, Texas." [Could also be mapped under physical_collection field.]
      Basbanes Texts:
        - dc_description # "From the professional archives of Nicholas A. Basbanes, now held by Cushing Memorial Library & Archives, Texas A&M University." [Could also be mapped under physical_collection field.]
      Berger-Cloonan:
        - tamudigital_local/details # "Surface application; Printed; P4.D6.F2; Overall pattern of floral design with orange and green diamond paste background; backed; Contained in BASSENGE folder;  Was book cover; book plate on verso; No Haemmerle; Sidney E. Berger and Michele V. Cloonan purchased the sheet from Bassenge Kunst und Buchauktion (Auction 97, Lot #5406) in 08/2011.; Section(s) from the Decorated and Decorative Paper Terms Thesaurus: VIII.H.1.d.1; Not signed. Not stamped.; Creased at center fold line; worn at crease; edge tear"
      Bryan 150th:
        - tamudigital_local/details # "Picture Files Bryan Early-1986 #49"
        - dc_description # "Held in the Bryan Scenes picture file at Cushing Memorial Library on the campus of Texas A&M University, College Station, Texas." [Could also be mapped under physical_collection field.]
      Building History:
        - dc_description # building history information
      Charting Texas:
        - dc_description # Date of object estimated by library to be 1845.|Held in the Floyd and Louise Chapman Texas and Borderlands Collection at Cushing Memorial Library and Archives on the campus of Texas A and M University, College Station, Texas.
      Cherokee Freedmen:
        - dc_description # The letter is addressed from "Muskogee, Indian Territory."|"COPY" is stamped at the top of the page.|"Incl. B-27."|Cherokee Freedman, R-421."
      College of Veterinary Medicine:
        - tamudigital_local/details # Written on photograph: "Aerial photograph of Vet. School area before 1979."
        - dc_description # Printed at bottom of photograph: "Theobald Smith in 1889." [combine with local/details]
      Gray Diary:
        - dc_description # The Cushing Library/Chapman Texas Collection copy is part of the Floyd & Louise Chapman Texas & Borderlands Collection. "Five hundred copies of this book have been printed in Fairfield types on Glatfelter paper. Designed by W. Thomas Taylor."--Colophon.
      Houston Oil Minutes:
        - dc_description # Cover title.|Minute book, 1901-1908|Gift of Amanda and Ken Kellar '65|The Cushing Library/Chapman Texas Collection copy is part of the Floyd & Louise Chapman Texas & Borderlands Collection.|Minutes are handwritten; index is typed.|First entry, July 9 1901 - last entry May 25, 1908.
      La Linda Poblana:
        - dc_description # Held in the Colonial Mexican Imprint Collection at Cushing Memorial Library on the campus of Texas A&M University, College Station, Texas.|PQ7296.G3 L5 1802
      London Maps:
        - dc_description # Prepared from air photographs taken by R.A.F; Original item had scale: circa 1:1,250. 50 inches = 1 mile;  Incomplete series of photomaps. No more published; Maps compiled from 1945-1951 aerial photographs
      SciFi Exhibit 2021:
        - dc_description # Book jacket image of the copy held in the Science Fiction & Fantasy Research Collection at Cushing Memorial Library on the campus of Texas A&M University, College Station, Texas and included in an exhibition, "Live To Build A Better World: Despair, Survival, and Hope in Science Fiction‚Äôs Response to Environmental Change,"  at Cushing from January 19, 2021-June 30, 2021. [Could also be mapped under physical_collection field.]
      Time of Resolve:
        - dc_description # Inscription on item: Architectural Detail Photo #; This item was part of an exhibit,  "Texas A&M during the Great Depression," shown in Cushing Memorial Library from August 31, 2018 through February 22, 2019.; Cushing Memorial Library and Archives; Remstar #3
      Woellhof:
        - dc_description # In lower right corner (in plate): 6.|With numbered distances along road.|Each segment has compass rose|Title in decorative cartouche, with fruits.|Vertical fold line at center.|Relief shown pictorially.|Shows the road, cities, towns, forested areas, rivers, hills, and buildings.|Appears in: Britannia, or, the kingdom of England and dominion of Wales, actually survey'd.|The Cushing Library copy is part of the Ronald L. and V. Jane Woellhof Rare Map Collection.
