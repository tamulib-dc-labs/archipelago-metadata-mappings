---
#------------------------------
#   Archipelago Fields
#------------------------------

profile:
  date_modified: '2026-03-18'
  version: 0.2

fields:
  abstract:
    definition: "A summary of the resource."
    mapping:
      OAI:
        dc: dc:description
        qdc: dcterms:abstract
        mods: <abstract>
    min: 0
    max: 1
    type: str
    user info: "Summary or abstract of the resource."
    example: "Photo postcard of the interior of Notre-Dame de Reims."
    label: Abstract
  access_rights:
    definition: "Information about who access the resource or an indication of its security status."
    mapping:
      OAI:
        dc: dc:rights
        qdc: dcterms:accessRights
        mods: <accessCondition type="restriction on access">
    min: 0
    type: str
    user info: "Information about who access the resource or an indication of its security status."
    example: "Openly accessible"
    label: Access Rights
  agent:
    definition: "An entity responsible for making the resource."
    mapping:
      OAI:
        dc: dc:creator
        qdc: dcterms:creator
        mods: <name type="personal/corporate" valueURI=""><namePart>, <role><roleTerm type="text" authority=marcrelator><roleTerm type="code" authority=marcrelator><roleTerm valueURI="">
      facet: 
        field: Creators & Contributors
        jmes: agent[]
    min: 0
    type: object
    user info: "An entity responsible for making the resource. Map all creator/contributors that have a role other than creator or contributor here."
    example: {"value": "Lastname, Firstname", "role": "interviewee", "role_uri": "http://id.loc.gov/vocabulary/relators/ive"}
    label: Creators and Contributors
  agent_linked_data:
    definition: "An entity responsible for making the resource using a controlled vocabulary."
    mapping:
      OAI:
        dc: dc:creator
        qdc: dcterms:creator
        mods: <name type="personal/corporate" valueURI=""><namePart>, <role><roleTerm type="text" authority=marcrelator><roleTerm type="code" authority=marcrelator><roleTerm valueURI="http://id.loc.gov/vocabulary/relators/cre">
      facet: 
        field: Creators & Contributors
        jmes: agent_linked_data[].value   
    min: 0
    type: object
    user info: "An entity responsible for making the resource using a controlled vocabulary."
    example: {"value": "McInnis, Louis Lowry, 1855-1933", "uri": "https://lccn.loc.gov/n2008161849", "role": "creator", "role_uri": "http://id.loc.gov/vocabulary/relators/cre"}
    label: Creators and Contributors
  audience:
    definition: "A class of agents for whom the resource is intended or useful."
    mapping:
      OAI:
        qdc: dcterms:audience
        mods: <targetAudience>
    min: 0
    type: str
    user info: "A class of agents for whom the resource is intended or useful."
    example: "Graduate||Undergraduate"
    label: Audience
  classification:
    definition: "A designation applied to a resource that indicates the subject by applying a formal system of coding and organizing resources according to subject areas.."
    mapping:
        OAI:
          dc: dc:subject
          qdc: dcterms:subject
          mods: <classification authority="">
    min: 0
    max: 1
    type: object
    user info: "Classification information, such as LCC call number"
    example: {"value": "G4031 .E424 1763 .P5", "authority": "lcc"}
    label: Classification
  collecting_area: # if ADO does not have this field already, it needs to be created
    definition: "The collecting area to which the ADO and corresponding physical item belong."
    mapping:
        OAI:
          dc: dc:relation
          qdc: dcterms:isPartOf
          mods: <relatedItem type="host">
        facet: 
          field: Collecting Area
          jmes: collecting_area[]
    min: 0
    max: 1
    type: str # will become a clickable link using the ispartof and ismemberof Archipelago fields
    user info: "The collecting area to which the ADO and corresponding physical item belong."
    example: "Cushing Library. Children's Collection"
    label: Collecting Area
  coordinates:
    description: "Human readable spatial characteristics of the resource as represented by coordinates. Not machine actionable."
    mapping:
      OAI:
        dc: dc:coverage
        qdc: dcterms:spatial
        mods: <originInfo><place><cartographics><cartographicExtension>
    min: 0
    type: str
    user info: "Human readable spatial characteristics of the resource as represented by coordinates. Not machine actionable."
    example: "Scale not given (E 63¬∞55 π00 ∫--E 97¬∞34 π00 ∫/N 36¬∞46 π00 ∫--N 7¬∞40 π00 ∫)."
    label: Coordinates
  content_type:
    definition: "The nature or genre of the resource."
    mapping:
      OAI:
        dc: dc:type
        qdc: dcterms:type
        mods: <typeOfResource>
    min: 1
    type: str
    user info: "The nature or genre of the resource."
    example: "StillImage"
    label: Content Type
  contributor:
    description: "An entity responsible for making contributions to the resource."
    mapping:
      OAI:
        dc: dc:contributor
        qdc: dcterms:contributor
        mods: <name type="personal/corporate" valueURI=""><namePart>, <role><roleTerm type="text" authority=marcrelator><roleTerm type="code" authority=marcrelator><roleTerm valueURI="http://id.loc.gov/vocabulary/relators/ctb">
      facet: 
          field: Creators & Contributors
          jmes: contributor[]
    min: 0
    type: str
    user info: "An entity responsible for making contributions to the resource."
    example: "Albert, Martha|Von Weise, Chas.|Knalls, Lula|Breckinridge, Clifton Rodes, 1846-1932|Hastings, William Wirt, 1866-1938"
    label: Creators and Contributors
  creator:
    definition: "An entity primarily responsible for making the resource."
    mapping:
      OAI:
        dc: dc:creator
        qdc: dcterms:creator
        mods: <name type="personal/corporate" valueURI=""><namePart>, <role><roleTerm type="text" authority=marcrelator><roleTerm type="code" authority=marcrelator><roleTerm valueURI="http://id.loc.gov/vocabulary/relators/cre">
      facet: 
          field: Creators & Contributors
          jmes: creator[]
    min: 0
    type: str
    user info: "An entity primarily responsible for making the resource."
    example: "United States. Commission to the Five Civilized Tribes."
    label: Creators and Contributors
  date_available:
    definition: "Date the resource was originally made available in OAKTrust."
    mapping:
      OAI:
        dc: dc:date
        qdc: dcterms:date
        mods: <dateOther>
    min: 0
    max: 1
    type: date
    user info: "Date the resource was originally made available in OAKTrust. Only use for items migrated from OAKTrust."
    label: Date Available
  date_built:
    definition: "The date the building in the photograph was constructed."
    mapping:
      OAI:
        dc: dc:description
        qdc: dcterms:description
        mods: <note>
    min: 0
    max: 1
    type: date
    user info: "The date the building in the photograph was constructed."
    label: Date Built
  date_created:
    definition: "Date of creation of the resource."
    mapping:
      OAI:
        dc: dc:date
        qdc: dcterms:created
        mods: <originInfo><dateCreated>
      facet: 
          field: Date of Original
          jmes: date_created[]
    min: 0
    max: 1
    type: date
    user info: "Date of creation of the resource."
    example: "1889-11-30"
    label: Date Created
  date_digital_creation:
    definition: "Date the digital version of the resource was created."
    mapping:
      OAI:
        dc: dc:date
        qdc: dcterms:date
        mods: <note>
      min: 0
      max: 1
      type: date
      user info: "Date the digital version of the resource was first created (in Fedora, OAKTrust, Avalon, or Archipelago). This may be fedora:created or dc.date.accessioned. Do not put the date of Archipelago ingest for ADOs migrated from another repository."
      example: "2019-05-13T20:23:22.608000+00:00"
      label: Date Available Online
  date_issued:
    definition: "Date of formal issuance of the resource."
    mapping:
      OAI:
        dc: dc:date
        qdc: dcterms:issued
        mods: <originInfo><dateIssued>
      facet: 
          field: Date of Original
          jmes: date_issued[]
    min: 0
    max: 1
    type: date
    user info: "Date of formal issuance of the resource."
    example: "1983"
    label: Date Issued
  date_razed:
    definition: "The date the building in the photograph was destroyed."
    mapping:
      OAI:
        dc: dc:description
        qdc: dcterms:description
        mods: <note>
    min: 0
    max: 1
    type: date
    user info: "The date the building in the photograph was destroyed."
    label: Date Razed
  description:
    definition: "An account of the resource."
    mapping:
        OAI:
          dc: dc:description
          qdc: dcterms:description
          mods: <note>
    min: 0
    type: str
    user info: "An account of the resource, not including abstract/summary or table of contents."
    example: "Inscription on item: Architectural Detail Photo #; This item was part of an exhibit,  'Texas A&M during the Great Depression,' shown in Cushing Memorial Library from August 31, 2018 through February 22, 2019.; Cushing Memorial Library and Archives; Remstar #3"
    label: Description
  digital_exhibit: # if ADO does not have this field already, it needs to be created
    definition: "The parent digital collection or exhibit."
    note: "We're currently thinking this will be a json object with value / url in main.yml."
    mapping:
        OAI:
          dc: dc:relation
          qdc: dcterms:isPartOf
          mods: <relatedItem type="host">, <relatedItem type="series">
    min: 0
    max: 1
    type: object # will become a clickable link using the ispartof Archipelago field
    user info: "The parent digital collection or exhibit."
    example: {"value":"'Who in the world am I? Ah, that's the great puzzle!': The Faces of Alice in Wonderland", "uri": "https://spotlight.library.tamu.edu/spotlight/alice-in-wonderland"}
    label: Part of Digital Exhibit
  digital_publisher:
    definition: "An entity responsible for making the digital resource available."
    mapping:
      OAI:
        dc: dc:publisher
        qdc: dcterms:publisher
        mods: <note>
    min: 1
    user info: "An entity responsible for making the digital resource available."
    example: "Texas A & M University. Libraries"
    label: Digital Publisher
  extent:
    definition: "The size or duration of the resource."
    mapping:
        OAI:
          dc: dc:format
          qdc: dcterms:extent
          mods: <physicalDescription><extent>
    min: 0
    type: str
    user info: "The size or duration of the resource."
    example: "17 leaves (36 cm.)|299 pages|41 cm."
    label: Extent
  format:
    definition: "The file format, physical medium, or dimensions of the resource."
    mapping:
        OAI:
          dc: dc:format
          qdc: dcterms:format
          mods: <physicalDescription><digitalOrigin>
    min: 1
    max: 1
    type: str
    user info: "The file format, physical medium, or dimensions of the resource."
    example: "reformatted digital"
    label: Format
  genre_form:
    definition: "The nature or genre of the resource."
    mapping:
        OAI:
          dc: dc:type
          qdc: dcterms:type
          mods: <physicalDescription><form>, <genre>
        facet: 
          field: Genre
          jmes: genre_form[]
    min: 0
    type: str
    user info: "Form and/or genre of the resource."
    example: "Correspondence"
    label: Genre
  genre_form_linked_data:
    definition: "The nature or genre of the resource that uses a controlled vocabulary."
    mapping:
        OAI:
          dc: dc:type
          qdc: dcterms:type
          mods: <physicalDescription><form>, <genre>
        facet: 
          field: Genre
          jmes: genre_form_linked_data[].value
    min: 0
    type: object
    user info: "Form and/or genre of the resource that uses a controlled vocabulary such as LCGFT or AAT."
    example: {"value": "Personal correspondence", "uri": "https://lccn.loc.gov/gf2014026141"}
    label: Genre
  geographic_subject:
    definition: "Geographic topics and spatial characteristics of the resource."
    mapping:
      OAI:
        dc: dc:coverage
        qdc: dcterms:spatial
        mods: <subject><geographic>
      facet: 
          field: Subjects
          jmes: geographic_subject[]
    min: 0
    type: str
    user info: "Geographic topics and spatial characteristics of the resource."
    example: "College Station, Texas"
    label: Geographic Subject
  geographic_subject_linked_data:
    definition: "Geographic subjects and spatial characteristics of the resource that uses a controlled vocabulary."
    mapping:
      OAI:
        dc: dc:coverage
        qdc: dcterms:spatial
        mods: <subject><geographic>
      facet: 
          field: Subjects
          jmes: geographic_subject_linked_data[].value
    min: 0
    type: object
    user info: "Geographic subjects and spatial characteristics of the resource that uses a controlled vocabulary."
    example: {"value": "College Station (Tex.)", "uri": "https://lccn.loc.gov/n79059553"}
    label: Geographic Subject
  identifier:
    definition: "An unambiguous reference to the resource within a given context."
    mapping:
        OAI:
          dc: dc:identifier
          qdc: dcterms:identifier
          mods: <identifier type="">
    min: 0
    type: object
    user info: "An unambiguous reference to the resource within a given context."
    example: {"value": "5406|12306", "authority": "local"}
    label: Identifier
  ismemberof:
    definition: "The Archipelago node_uuid of the Collection the item is a part of."
    mapping:
      OAI:
        dc: dc:related
        qdc: dcterms:isPartOf
        mods: <related item type="host">
      facet: 
          field: Part of Collection
          jmes: ismemberof[]
    min: 0
    max: 1
    type: str (node_uuid)
    user info: "The Archipelago node_uuid of the Collection the item is a part of."
    label: Is Member Of
  ispartof:
    definition: "The Archipelago node_uuid of the Collection the item is a part of."
    mapping:
      OAI:
        dc: dc:related
        qdc: dcterms:isPartOf
        mods: <related item type="host">
    min: 0
    max: 1
    type: str (node_uuid)
    user info: "The Archipelago node_uuid of the Collection the item is a part of."
    label: Is Part Of
  label:
    definition: "A name given to the resource. This can be a supplied title if there is no existing title or if the existing title does not provide enough information for users to distinguish the item from others."
    mapping:
      OAI:
        dc: dc:title
        qdc: dcterms:title
        mods: <titleInfo><title>
    min: 1
    max: 1
    type: str
    user info: "A name given to the resource. This can be a supplied title if there is no existing title or if the existing title does not provide enough information for users to distinguish the item from others."
    example: "Cat Placed in Special Containment Area, number 05"
    label: Title
  language:
    definition: "A language of the resource."
    mapping:
        OAI:
          dc: dc:language
          qdc: dcterms:language
          mods: <language>
        facet: 
          field: Language
          jmes: language[]
    min: 0
    type: str
    user info: "A language of the resource."
    example: "eng"
    label: Language
  local_department:
    definition: "A&M department the item pertains to."
    mapping:
      OAI:
        dc: dc:contributor, dc:description
        qdc: dcterms:contributor, dcterms:description
        mods: <originInfo><publisher>
    min: 0
    type: str
    user info: "A&M department the item pertains to."
    label: Local Department
  medium:
    definition: "The material or physical carrier of the resource."
    mapping:
      dc: dc:format
      qdc: dcterms:medium
      mods: <physicalDescription><form>
    min: 0
    type: str
    user info: "The material or physical carrier of the resource."
    example: "Paper|Leather"
    label: Medium
  mimetype:
    definition: "The electronic format type, or the data representation, of the resource."
    mapping:
      OAI:
        dc: dc:format
        qdc: dcterms:format
        mods: <physicalDescription><internetMediaType>
    min: 0
    type: str
    user info: "The electronic format type, or the data representation, of the resource."
    label: Mimetype
  note:
    definition: "Any details captured about the resource that do not fit elsewhere in the schema."
    mapping:
      dc: dc:description
      qdc: dcterms:description
      mods: <note>
    min: 0
    type: str
    user info: "Any details captured about the resource that do not fit elsewhere in the schema."
    example: "The source is a reel tape. The playback device was a TEAC A-3340S reel-to-reel tape deck playing at a speed of 7.5 ips. The audio was captured with Hammerfall DSP Multiface II A/D Converter hardware and Adobe Audition software. Editing and processing was also performed with Adobe Audition. For the access files, Normalize process was used to modify volume levels."
    label: Note
  original_publication:
    definition: "The work the object was originally published as a part of."
    mapping:
        OAI:
          dc: dc:relation
          qdc: dcterms:isPartOf
          mods: <relatedItem type="otherFormat">
    min: 0
    type: str
    user info: "If the physical object was originally published as part of another work, enter that work here."
    example: "Lewis Carroll. Alice in Wonderland. Borders Press, 2002"
    label: Original Publication
  original_publisher:
    definition: "An entity responsible for making the original resource available."
    mapping:
      OAI:
        dc: dc:publisher
        qdc: dcterms:publisher
        mods: <originInfo><publisher>
    min: 0
    max: 1
    user info: "An entity responsible for making the original resource available."
    example: "E.C. Kropp Co."
    label: Original Publisher
  physical_collection:
    definition: "The physical collection from which the item was digitized."
    mapping:
        OAI:
          dc: dc:relation
          qdc: dcterms:isPartOf
          mods: <relatedItem type="otherFormat">
    min: 0
    max: 1
    type: str
    user info: "The physical collection from which the item was digitized."
    example: "College of Veterinary Medicine Image Collection"
    label: Physical Collection
  physical_location:
    definition: "Information about the physical location, such as the box and folder, from which the item was digitized."
    mapping:
        OAI:
          dc: dc:relation
          qdc: dcterms:isPartOf
          mods: <relatedItem type="otherFormat">
    min: 0
    max: 1
    type: str
    user info: "Information about the physical location, such as the box and folder, from which the item was digitized."
    example: "1/20: Rowe Family. Joseph (R-360, D-1016), Parmelia (R-361, D-681). 1901, 1903-1904"
    label: Physical Location
  projection:
    definition: "The projection of the map"
    mapping:
      OAI:
        dc: dc:description
        qdc: dcterms:description
        mods: <note>
    min: 0
    type: str
    user info: "The projection of the map. Only use for Map worktype."
    label: Projection
  provenance:
    definition: "A statement of any changes in ownership and custody of the resource since its creation that are significant for its authenticity, integrity, and interpretation."
    mapping:
      OAI:
        qdc: dcterms:provenance
        mods: <originInfo><dateCaptured>
    min: 0
    type: str
    user info: "A statement of any changes in ownership and custody of the resource since its creation that are significant for its authenticity, integrity, and interpretation."
    example: "This nineteenth century photograph is an 'Ebay' purchase made by librarian Trenton Boyd and donated to the Medical Sciences Library."
    label: Provenance
  related_item:
    definition: "A related resource."
    mapping:
      OAI:
        dc: dc:relation
        qdc: dcterms:relation
        mods: <relatedItem type="otherFormat">
    min: 0
    type: str
    user info: "A related resource, such as a catalog record. Do not map parent/child ADOs to this field."
    example: "https://libcat.tamu.edu/vwebv/holdingsInfo?bibId=4702618"
    label: Related Item
  related_url:
    definition: "A url to a relevant item, such as the same digital object hosted on another platform."
    mapping:
      OAI:
        dc: dc:relation
        qdc: dcterms:relation
        mods: <relatedItem type="references">
    min: 0
    max: 1
    type: url
    user info: "A url to a relevant item, such as the same digital object hosted on another platform."
    example: "https://avalon.library.tamu.edu/media_objects/00000005c"
    label: Related URL
  related_url_historic:
    definition: "A historic url to a related item."
    mapping:
      OAI:
        dc: dc:relation
        qdc: dcterms:relation
        mods: <relatedItem type="references">
    min: 0
    max: 1
    type: str
    user info: "A historic url to a related item. Map urls to archived website and exhibits here."
    example: "https://aavptbiennial-ojs-tamu.tdl.org/aavptbiennial"
    label: Related URL
  rights_holder:
    definition: "A person or organization owning or managing rights over the resource."
    mapping:
      OAI:
        qdc: dcterms:rightsHolder
    min: 0
    user info: "A person or organization owning or managing rights over the resource."
    example: "Illustrator" # Is this a real example?  It just looks like a role.
    label: Rights Holder
  rights:
    definition: "Information about rights held in and over the resource."
    mapping:
      OAI:
        dc: dc:rights
        qdc: dcterms:rights
        mods: <accessCondition type="use and reproduction">
    min: 1
    max: 1
    type: uri
    user info: "URI with information about rights held in and over the resource."
    example: "http://rightsstatements.org/vocab/NoC-US/1.0/"
    label: Rights Statement
  rights_details:
    definition: "Information about rights held in and over the resource."
    mapping:
      OAI:
        dc: dc:rights
        qdc: dcterms:rights
        mods: <accessCondition type="use and reproduction">
    min: 0
    max: 1
    type: str
    user info: "Free text with information about rights held in and over the resource."
    example: "A copyright review process in August 2018 has determined that this particular item is in copyright, but the rights holder is unclear or unresponsive.  The Libraries provide access to the materials here as a digital aggregate under an assertion of fair use for non-commercial educational use (17 U.S. Code ¬ß 107) as well as of fair dealing for the illustrations published in the UK (Copyright, Designs and Patent Act 1988 [UK]). The written permission of any copyright and other rights holders is required for distribution, reproduction, or other use that extends beyond what is authorized by fair use and other statutory exemptions. Responsibility for making an independent legal assessment of an item and securing any necessary permissions ultimately rests with persons desiring to use the item. TAMU Libraries would be interested in updating the copyright holder information on items displayed in these collections.  Please use the contact method provided below to help update these records for future researchers."
    label: Rights Details
  sequence_id:
    definition: "The order an ADO appears in within a CreativeWorkSeries."
    min: 0
    max: 1
    type: int
    user info: "The order an ADO appears in within a CreativeWorkSeries."
    example: "4"
    label: Sequence Id
  sponsorship:
    definition: "An agent that sponsored creation of the resource."
    mapping:
      OAI:
        dc: dc:description
        qdc: dcterms:description
        mods: <originInfo><agent>
    min: 0
    type: str
    user info: "An agent that sponsored creation of the resource."
    label: Sponsorship
  state_edition:
    definition: "The specific version of a map."
    mapping:
      OAI:
        dc: dc:description
        qdc: dcterms:description
        mods: <note>
    min: 0
    type: str
    user info: "Specific version of a map. Use only for Map worktype."
    label: State Edition
  subject:
    definition: "A topic of the resource."
    mapping:
      OAI:
        dc: dc:subject
        qdc: dcterms:subject
        mods: <subject><topic>
      facet: 
          field: Subjects
          jmes: subject[]
    min: 0
    type: str
    user info: "A topic of the resource."
    example: "Airports Texas--Maps"
    label: Subject
  subject_linked_data:
    definition: "A topic of the resource that uses controlled vocabulary."
    mapping:
      OAI:
        dc: dc:subject
        qdc: dcterms:subject
        mods: <subject><topic>
      facet: 
          field: Subjects
          jmes: subject_linked_data[].value
    min: 0
    type: object
    user info: "A topic of the resource that uses controlled vocabulary."
    example: {"value": "Agricultural and Mechanical College of Texas", "uri": "http://id.loc.gov/authorities/names/n84055172"}
    label: Subject
  table_of_contents:
    definition: "A list of subunits of the resource."
    mapping:
      OAI:
        dc: dc:description
        qdc: dcterms:tableOfContents
        mods: <tableOfContents>
    min: 0
    max: 1
    type: str
    user info: "A list of subunits of the resource."
